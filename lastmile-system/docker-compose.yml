version: '3.8'

services:

  # ===== POSTGRESQL =====
  postgres:
    image: postgres:16
    container_name: lastmile-postgres
    environment:
      POSTGRES_DB: lastmile_db
      POSTGRES_USER: lastmile_user
      POSTGRES_PASSWORD: lastmile_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lastmile_user -d lastmile_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===== ZOOKEEPER (required by Kafka) =====
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: lastmile-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  # ===== KAFKA =====
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: lastmile-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true

volumes:
  postgres_data: