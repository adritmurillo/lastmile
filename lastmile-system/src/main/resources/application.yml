spring:
  application:
    name: lastmile-system

  # ===== DATABASE =====
  datasource:
    url: jdbc:postgresql://localhost:5432/lastmile_db
    username: ${DB_USERNAME:lastmile_user}
    password: ${DB_PASSWORD:lastmile_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      pool-name: LastMileHikariPool

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
        format_sql: false

  # ===== FLYWAY =====
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ===== KAFKA =====
  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      retries: 3
      properties:
        enable.idempotence: true
    consumer:
      group-id: lastmile-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.lastmile.*"

  # ===== FILE UPLOAD =====
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB

  # ===== EMAIL =====
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:joaquintumba010@gmail.com}
    password: ${MAIL_PASSWORD:nwsywphuycalzdxk}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# ===== CUSTOM SYSTEM CONFIGURATION =====
lastmile:
  warehouse:
    name: "Main Warehouse Lima"
    latitude: ${WAREHOUSE_LAT:-12.0464}
    longitude: ${WAREHOUSE_LNG:-77.0428}

  orders:
    max-delivery-attempts: 3
    chunk-size-load: 500

  google-maps:
    api-key: ${GOOGLE_MAPS_API_KEY:dummy-key-for-development}

# ===== API DOCUMENTATION =====
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

# ===== LOGGING =====
logging:
  level:
    com.lastmile: DEBUG
    org.springframework.kafka: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

jwt:
  secret: lastmile-super-secret-key-2026-must-be-at-least-256-bits-long
  expiration: 86400000